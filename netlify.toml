[build]
  publish = "."

# www → non-www
[[redirects]]
  from = "https://www.gabrielaarghiroiu.ro/*"
  to = "https://gabrielaarghiroiu.ro/:splat"
  status = 301
  force = true

# Blog articol individual
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/post.html"
  status = 200
  conditions = {Language = ["ro"]}

